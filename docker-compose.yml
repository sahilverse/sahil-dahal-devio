services:
  postgres:
    image: postgres:18-alpine
    container_name: devio-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - devio-network

  redis:
    image: redis:8-alpine
    container_name: devio-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - devio-network

  minio:
    image: minio/minio:latest
    container_name: devio-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}

      MINIO_NOTIFY_WEBHOOK_ENABLE_problems: "on"
      MINIO_NOTIFY_WEBHOOK_ENDPOINT_problems: "http://backend:8000/api/problems/webhook/minio"

      MINIO_NOTIFY_WEBHOOK_ENABLE_labs: "on"
      MINIO_NOTIFY_WEBHOOK_ENDPOINT_labs: "http://backend:8000/api/labs/webhook/minio"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data
    networks:
      - devio-network

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: devio-backend
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
      - minio
    env_file:
      - apps/backend/.env.docker
    ports:
      - "8000:8000"
    volumes:
      - ./apps/backend/src:/app/apps/backend/src
    networks:
      - devio-network

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: devio-frontend
    restart: unless-stopped
    depends_on:
      - backend
    env_file:
      - apps/frontend/.env.docker
    ports:
      - "3000:3000"
    volumes:
      - ./apps/frontend/src:/app/apps/frontend/src
      - ./apps/frontend/public:/app/apps/frontend/public
    networks:
      - devio-network

  code-sandbox:
    build:
      context: .
      dockerfile: apps/code-sandbox/Dockerfile
    container_name: devio-code-sandbox
    restart: unless-stopped
    depends_on:
      - redis
    env_file:
      - apps/code-sandbox/.env.docker
    ports:
      - "5000:5000"
    volumes:
      - ./apps/code-sandbox/src:/app/apps/code-sandbox/src
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - devio-network

  lab-orchestrator:
    build:
      context: .
      dockerfile: apps/lab-orchestrator/Dockerfile
    container_name: devio-lab-orchestrator
    restart: unless-stopped
    depends_on:
      - redis
    env_file:
      - apps/lab-orchestrator/.env.docker
    ports:
      - "5500:5500"
    volumes:
      - ./apps/lab-orchestrator/src:/app/apps/lab-orchestrator/src
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - devio-network

  transcoder:
    build:
      context: .
      dockerfile: apps/transcoder/Dockerfile
    container_name: devio-transcoder
    restart: unless-stopped
    depends_on:
      - redis
      - minio
    # Note: NVIDIA settings below are ignored by the transcoder if no GPU is detected at runtime.
    # It will automatically fall back to CPU (libx264) sequentially.
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,video,utility
    env_file:
      - apps/transcoder/.env.docker
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu, video ]
    volumes:
      - ./apps/transcoder/src:/app/apps/transcoder/src
    networks:
      - devio-network

networks:
  devio-network:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  miniodata:
